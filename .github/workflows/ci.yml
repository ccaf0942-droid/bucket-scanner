name: DevSecOps Pipeline

on:
  push:
    branches: [master]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bandit:
    needs: [gitleaks]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Bandit SAST
        run: |
          pip install bandit
          bandit -r . || true

  pip:
    needs: [gitleaks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run pip audit
        run: |
          pip install pip-audit
          pip-audit --requirement requirements.txt

  flake8:
    needs: [gitleaks]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Flake8 Lint
        run: |
          pip install flake8
          flake8 . --max-line-length=120

  build:
    needs: [bandit, pip, flake8]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t cr.yandex/${{ secrets.YC_REGISTRY_ID }}/bucket-scanner:v124 .
    
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "cr.yandex/${{ secrets.YC_REGISTRY_ID }}/bucket-scanner:v124"
          format: "table"
          exit-code: "1"
          severity: "CRITICAL"

      - name: Docker Login
        run: |
          echo '${{ secrets.YC_PRIVATE_KEY }}' | docker login --username json_key --password-stdin cr.yandex

      - name: Docker Push Yandex.cloud
        run: |
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/bucket-scanner:v124
